<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<title>PulseBoard — Live Social Analytics</title>
<meta name="viewport" content="width=device-width, initial-scale=1">
<style>
/* ============================ TOKENS ============================ */
:root{
  --bg:#0E1220; --surface:#161B2C; --surface-2:#1E2439; --elev:#232B44;
  --border:rgba(255,255,255,.08); --border-2:rgba(255,255,255,.14);
  --ink:#EDF0F7; --ink-2:#AEB6C9; --muted:#727C93;
  --accent:#8B5CF6; --accent-2:#A78BFA; --accent-soft:rgba(139,92,246,.14);
  --fb:#3B82F6; --ig:#E5670E; --tt:#0FA896;
  --fb-soft:rgba(59,130,246,.14); --ig-soft:rgba(229,103,14,.14); --tt-soft:rgba(15,168,150,.14);
  --good:#22C55E; --warn:#F59E0B; --crit:#EF4444;
  --grid:rgba(255,255,255,.06); --shadow:0 18px 48px -24px rgba(0,0,0,.75);
  --r:14px; --r-sm:10px;
  --sans:"Segoe UI Variable Text","Segoe UI",system-ui,-apple-system,Roboto,sans-serif;
  --mono:ui-monospace,"Cascadia Mono","SF Mono",Menlo,Consolas,monospace;
}
@media (prefers-color-scheme:light){
  :root{
    --bg:#F1F4FA; --surface:#FFFFFF; --surface-2:#F7F9FD; --elev:#FFFFFF;
    --border:rgba(16,22,40,.10); --border-2:rgba(16,22,40,.17);
    --ink:#0F1526; --ink-2:#414B63; --muted:#6B7488;
    --accent:#7C3AED; --accent-2:#6D28D9; --accent-soft:rgba(124,58,237,.10);
    --fb:#2F73E8; --ig:#D65A0A; --tt:#0C8F80;
    --fb-soft:rgba(47,115,232,.10); --ig-soft:rgba(214,90,10,.10); --tt-soft:rgba(12,143,128,.10);
    --grid:rgba(16,22,40,.07); --shadow:0 18px 44px -26px rgba(16,22,40,.30);
  }
}
:root[data-theme="dark"]{
  --bg:#0E1220; --surface:#161B2C; --surface-2:#1E2439; --elev:#232B44;
  --border:rgba(255,255,255,.08); --border-2:rgba(255,255,255,.14);
  --ink:#EDF0F7; --ink-2:#AEB6C9; --muted:#727C93;
  --accent:#8B5CF6; --accent-2:#A78BFA; --accent-soft:rgba(139,92,246,.14);
  --fb:#3B82F6; --ig:#E5670E; --tt:#0FA896;
  --fb-soft:rgba(59,130,246,.14); --ig-soft:rgba(229,103,14,.14); --tt-soft:rgba(15,168,150,.14);
  --grid:rgba(255,255,255,.06); --shadow:0 18px 48px -24px rgba(0,0,0,.75);
}
:root[data-theme="light"]{
  --bg:#F1F4FA; --surface:#FFFFFF; --surface-2:#F7F9FD; --elev:#FFFFFF;
  --border:rgba(16,22,40,.10); --border-2:rgba(16,22,40,.17);
  --ink:#0F1526; --ink-2:#414B63; --muted:#6B7488;
  --accent:#7C3AED; --accent-2:#6D28D9; --accent-soft:rgba(124,58,237,.10);
  --fb:#2F73E8; --ig:#D65A0A; --tt:#0C8F80;
  --fb-soft:rgba(47,115,232,.10); --ig-soft:rgba(214,90,10,.10); --tt-soft:rgba(12,143,128,.10);
  --grid:rgba(16,22,40,.07); --shadow:0 18px 44px -26px rgba(16,22,40,.30);
}

*{box-sizing:border-box}
html,body{margin:0;height:100%}
body{background:var(--bg);color:var(--ink);font-family:var(--sans);
  font-size:14px;line-height:1.5;-webkit-font-smoothing:antialiased;overflow:hidden}
button{font-family:inherit;cursor:pointer;color:inherit}
input{font-family:inherit}
::selection{background:var(--accent-soft)}
.tnum{font-variant-numeric:tabular-nums}
.mono{font-family:var(--mono)}
h1,h2,h3{margin:0;text-wrap:balance}
.eyebrow{font-size:11px;letter-spacing:.14em;text-transform:uppercase;color:var(--muted);font-weight:600}
:focus-visible{outline:2px solid var(--accent);outline-offset:2px;border-radius:6px}
@media (prefers-reduced-motion:reduce){*{animation-duration:.001ms!important;transition-duration:.001ms!important}}

/* scrollbars */
*::-webkit-scrollbar{width:10px;height:10px}
*::-webkit-scrollbar-thumb{background:var(--border-2);border-radius:20px;border:3px solid transparent;background-clip:padding-box}

/* ============================ AUTH ============================ */
#auth{position:fixed;inset:0;display:grid;place-items:center;padding:24px;overflow:auto;
  background:radial-gradient(120% 90% at 15% 0%,var(--accent-soft),transparent 55%),var(--bg)}
#pulseCanvas{position:absolute;inset:0;width:100%;height:100%;opacity:.5;pointer-events:none}
.auth-card{position:relative;width:min(420px,100%);background:var(--surface);
  border:1px solid var(--border);border-radius:20px;padding:34px 30px;box-shadow:var(--shadow)}
.brand{display:flex;align-items:center;gap:11px;margin-bottom:26px}
.logo{width:38px;height:38px;border-radius:11px;display:grid;place-items:center;flex:none;
  background:linear-gradient(140deg,var(--accent),var(--fb));box-shadow:0 8px 22px -8px var(--accent)}
.logo svg{width:22px;height:22px}
.brand b{font-size:18px;letter-spacing:-.02em}
.brand span{display:block;font-size:11px;color:var(--muted);letter-spacing:.02em;font-weight:500}
.auth-card h1{font-size:24px;letter-spacing:-.02em;margin-bottom:6px}
.auth-card .sub{color:var(--ink-2);margin-bottom:22px;font-size:13.5px}
.field{margin-bottom:14px}
.field label{display:block;font-size:12px;font-weight:600;color:var(--ink-2);margin-bottom:6px}
.field input{width:100%;padding:11px 13px;background:var(--surface-2);color:var(--ink);
  border:1px solid var(--border);border-radius:var(--r-sm);font-size:14px;transition:border-color .15s}
.field input:focus{border-color:var(--accent);outline:none}
.btn{width:100%;padding:12px;border:none;border-radius:var(--r-sm);font-weight:650;font-size:14.5px;
  background:var(--accent);color:#fff;transition:transform .1s,filter .15s}
.btn:hover{filter:brightness(1.08)}.btn:active{transform:translateY(1px)}
.btn.ghost{background:transparent;border:1px solid var(--border-2);color:var(--ink)}
.auth-alt{margin-top:18px;font-size:13px;color:var(--muted);text-align:center}
.auth-alt a{color:var(--accent-2);font-weight:600;cursor:pointer;text-decoration:none}
.auth-note{margin-top:18px;font-size:11.5px;color:var(--muted);text-align:center;line-height:1.5}
.err{color:var(--crit);font-size:12.5px;margin-top:-4px;margin-bottom:10px;min-height:16px}

/* ============================ APP SHELL ============================ */
#app{display:none;height:100%;grid-template-columns:230px 1fr;grid-template-rows:100%}
#app.on{display:grid}
.rail{background:var(--surface);border-right:1px solid var(--border);display:flex;flex-direction:column;min-height:0}
.rail-top{padding:20px 18px 14px}
.rail .brand{margin-bottom:0}
.nav{padding:10px;display:flex;flex-direction:column;gap:2px;flex:1;overflow:auto}
.nav-lbl{font-size:10.5px;letter-spacing:.13em;text-transform:uppercase;color:var(--muted);
  font-weight:700;padding:14px 12px 6px}
.nav a{display:flex;align-items:center;gap:11px;padding:10px 12px;border-radius:var(--r-sm);
  color:var(--ink-2);font-weight:550;font-size:13.5px;text-decoration:none;transition:background .12s,color .12s}
.nav a svg{width:18px;height:18px;flex:none;opacity:.9}
.nav a:hover{background:var(--surface-2);color:var(--ink)}
.nav a.active{background:var(--accent-soft);color:var(--accent-2)}
.nav a.active svg{opacity:1}
.rail-foot{padding:12px;border-top:1px solid var(--border)}
.userchip{display:flex;align-items:center;gap:10px;padding:8px;border-radius:var(--r-sm);width:100%;
  background:transparent;border:1px solid transparent;text-align:left}
.userchip:hover{background:var(--surface-2)}
.avatar{width:32px;height:32px;border-radius:9px;flex:none;display:grid;place-items:center;
  font-weight:700;font-size:13px;color:#fff;background:linear-gradient(140deg,var(--accent),var(--tt))}
.userchip .u-nm{font-weight:600;font-size:13px;line-height:1.2;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.userchip .u-em{font-size:11px;color:var(--muted);overflow:hidden;text-overflow:ellipsis;white-space:nowrap}

.main{min-width:0;min-height:0;display:flex;flex-direction:column}
.topbar{display:flex;align-items:center;gap:14px;padding:14px 22px;border-bottom:1px solid var(--border);
  background:color-mix(in srgb,var(--surface) 82%,transparent);backdrop-filter:blur(8px);flex:none;flex-wrap:wrap}
.topbar h2{font-size:17px;letter-spacing:-.01em}
.topbar .grow{flex:1}
.live-badge{display:inline-flex;align-items:center;gap:7px;font-size:11.5px;font-weight:650;
  color:var(--good);background:color-mix(in srgb,var(--good) 14%,transparent);
  padding:5px 10px;border-radius:20px;border:1px solid color-mix(in srgb,var(--good) 30%,transparent)}
.live-dot{width:7px;height:7px;border-radius:50%;background:var(--good);animation:blip 1.6s infinite}
@keyframes blip{0%,100%{opacity:1;transform:scale(1)}50%{opacity:.35;transform:scale(.7)}}
.seg{display:inline-flex;background:var(--surface-2);border:1px solid var(--border);border-radius:9px;padding:3px}
.seg button{padding:6px 12px;border:none;background:transparent;border-radius:6px;font-size:12.5px;
  font-weight:600;color:var(--ink-2)}
.seg button.on{background:var(--accent);color:#fff}
.icon-btn{width:36px;height:36px;border-radius:9px;border:1px solid var(--border);background:var(--surface-2);
  display:grid;place-items:center}
.icon-btn:hover{border-color:var(--border-2)}
.icon-btn svg{width:17px;height:17px}
.scope-sel{position:relative}
.scope-btn{display:flex;align-items:center;gap:9px;padding:7px 12px;border-radius:9px;
  border:1px solid var(--border);background:var(--surface-2);font-weight:600;font-size:13px}
.scope-btn:hover{border-color:var(--border-2)}
.dot{width:9px;height:9px;border-radius:3px;flex:none}
.menu{position:absolute;top:calc(100% + 6px);right:0;min-width:210px;background:var(--elev);
  border:1px solid var(--border-2);border-radius:12px;padding:6px;box-shadow:var(--shadow);z-index:40;display:none}
.menu.open{display:block}
.menu button{display:flex;align-items:center;gap:10px;width:100%;padding:9px 10px;border:none;
  background:transparent;border-radius:8px;font-size:13px;font-weight:550;color:var(--ink);text-align:left}
.menu button:hover{background:var(--surface-2)}
.menu hr{border:none;border-top:1px solid var(--border);margin:6px 2px}

.canvas{flex:1;overflow:auto;padding:22px;min-height:0}
.view{display:none}.view.on{display:block}
.grid{display:grid;gap:16px}
@media(min-width:900px){.grid.k4{grid-template-columns:repeat(4,1fr)}
  .grid.k3{grid-template-columns:repeat(3,1fr)}.grid.k2{grid-template-columns:repeat(2,1fr)}
  .span2{grid-column:span 2}}

.card{background:var(--surface);border:1px solid var(--border);border-radius:var(--r);padding:18px}
.card.pad0{padding:0;overflow:hidden}
.card-h{display:flex;align-items:center;gap:10px;margin-bottom:14px}
.card-h h3{font-size:14px;font-weight:650;letter-spacing:-.01em}
.card-h .grow{flex:1}
.card-h .hint{font-size:11.5px;color:var(--muted)}

/* stat tiles */
.tile{background:var(--surface);border:1px solid var(--border);border-radius:var(--r);padding:16px 17px;
  display:flex;flex-direction:column;gap:6px;position:relative;overflow:hidden}
.tile .t-lbl{font-size:11.5px;letter-spacing:.05em;text-transform:uppercase;color:var(--muted);font-weight:650}
.tile .t-val{font-size:27px;font-weight:720;letter-spacing:-.03em;line-height:1}
.tile .t-row{display:flex;align-items:flex-end;justify-content:space-between;gap:10px;margin-top:2px}
.spark{width:74px;height:30px;flex:none}
.delta{display:inline-flex;align-items:center;gap:3px;font-size:12px;font-weight:700;
  padding:2px 7px;border-radius:20px}
.delta.up{color:var(--good);background:color-mix(in srgb,var(--good) 13%,transparent)}
.delta.down{color:var(--crit);background:color-mix(in srgb,var(--crit) 13%,transparent)}
.delta svg{width:11px;height:11px}

/* legend + chart */
.legend{display:flex;gap:14px;flex-wrap:wrap;font-size:12px;color:var(--ink-2);font-weight:550}
.legend span{display:inline-flex;align-items:center;gap:6px;cursor:pointer;user-select:none}
.legend i{width:10px;height:10px;border-radius:3px}
.legend span.off{opacity:.4}
.chart-wrap{position:relative;width:100%}
.chart-wrap svg{display:block;width:100%}
.tip{position:absolute;pointer-events:none;background:var(--elev);border:1px solid var(--border-2);
  border-radius:10px;padding:9px 11px;font-size:12px;box-shadow:var(--shadow);z-index:20;
  transform:translate(-50%,-115%);white-space:nowrap;opacity:0;transition:opacity .1s}
.tip .tt-d{font-size:11px;color:var(--muted);margin-bottom:5px;font-weight:600}
.tip .tt-r{display:flex;align-items:center;gap:7px;line-height:1.7}
.tip .tt-r i{width:8px;height:8px;border-radius:2px}
.tip .tt-r b{margin-left:auto;font-variant-numeric:tabular-nums}

/* funnel */
.funnel{display:flex;flex-direction:column;gap:9px}
.fn-row{display:flex;flex-direction:column;gap:5px}
.fn-top{display:flex;justify-content:space-between;font-size:12.5px;font-weight:600}
.fn-top .fn-n{color:var(--ink-2)}
.fn-bar{height:26px;border-radius:7px;background:var(--surface-2);overflow:hidden}
.fn-fill{height:100%;border-radius:7px;display:flex;align-items:center;padding-left:10px;
  font-size:11.5px;font-weight:700;color:#fff;transition:width .6s cubic-bezier(.2,.7,.2,1)}
.fn-pct{font-size:11px;color:var(--muted);font-weight:600}

/* bars generic */
.barlist{display:flex;flex-direction:column;gap:11px}
.bl-row{display:grid;grid-template-columns:88px 1fr 52px;align-items:center;gap:10px;font-size:12.5px}
.bl-row .bl-k{color:var(--ink-2);font-weight:550;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.bl-track{height:9px;background:var(--surface-2);border-radius:20px;overflow:hidden}
.bl-fill{height:100%;border-radius:20px;transition:width .6s cubic-bezier(.2,.7,.2,1)}
.bl-v{text-align:right;font-weight:650;font-variant-numeric:tabular-nums;color:var(--ink)}

/* heatmap */
.heat{display:grid;grid-template-columns:34px repeat(24,1fr);gap:3px;font-size:10px}
.heat .hh{color:var(--muted);text-align:center;font-weight:600}
.heat .hd{color:var(--muted);display:flex;align-items:center;font-weight:600}
.heat .cell{aspect-ratio:1;border-radius:3px;background:var(--accent);min-height:12px}
.heat-legend{display:flex;align-items:center;gap:8px;font-size:11px;color:var(--muted);margin-top:12px}
.heat-legend .sc{width:13px;height:13px;border-radius:3px;background:var(--accent)}

/* table */
.tbl-wrap{overflow-x:auto}
table{width:100%;border-collapse:collapse;font-size:13px}
th{text-align:left;font-size:11px;letter-spacing:.05em;text-transform:uppercase;color:var(--muted);
  font-weight:650;padding:11px 14px;border-bottom:1px solid var(--border);white-space:nowrap;cursor:pointer;user-select:none}
th.num,td.num{text-align:right;font-variant-numeric:tabular-nums}
th:hover{color:var(--ink-2)}
td{padding:11px 14px;border-bottom:1px solid var(--border);white-space:nowrap}
tr:last-child td{border-bottom:none}
tbody tr:hover{background:var(--surface-2)}
.thumb{width:40px;height:40px;border-radius:8px;display:grid;place-items:center;font-size:18px;flex:none}
.post-c{display:flex;align-items:center;gap:11px;max-width:290px}
.post-t{overflow:hidden;text-overflow:ellipsis;white-space:nowrap;font-weight:550}
.post-d{font-size:11px;color:var(--muted)}
.pill{display:inline-flex;align-items:center;gap:6px;font-size:11.5px;font-weight:650;padding:3px 9px;border-radius:20px}
.pf{width:13px;height:13px}
.er-good{color:var(--good);font-weight:700}.er-mid{color:var(--warn);font-weight:700}

/* live feed */
.feed{display:flex;flex-direction:column;max-height:420px;overflow:auto}
.feed-i{display:flex;align-items:center;gap:12px;padding:11px 4px;border-bottom:1px solid var(--border)}
.feed-i:last-child{border-bottom:none}
.fi-ic{width:34px;height:34px;border-radius:10px;display:grid;place-items:center;flex:none}
.fi-ic svg{width:16px;height:16px}
.fi-tx{flex:1;font-size:13px;min-width:0}
.fi-tx b{font-weight:650}
.fi-tx .fi-s{color:var(--ink-2)}
.fi-t{font-size:11px;color:var(--muted);white-space:nowrap;font-variant-numeric:tabular-nums}
.feed-i.new{animation:slideIn .5s cubic-bezier(.2,.7,.2,1)}
@keyframes slideIn{from{opacity:0;transform:translateY(-8px)}to{opacity:1;transform:none}}

/* insights */
.insight{display:flex;gap:13px;padding:14px;border:1px solid var(--border);border-radius:12px;
  background:var(--surface-2);margin-bottom:11px}
.insight:last-child{margin-bottom:0}
.ins-ic{width:36px;height:36px;border-radius:10px;flex:none;display:grid;place-items:center}
.ins-ic svg{width:19px;height:19px}
.ins-b h4{font-size:13.5px;font-weight:650;margin-bottom:3px}
.ins-b p{font-size:12.5px;color:var(--ink-2);margin:0}
.ins-b .tag{display:inline-block;margin-top:7px;font-size:10.5px;font-weight:700;letter-spacing:.04em;
  text-transform:uppercase;padding:2px 8px;border-radius:6px;background:var(--accent-soft);color:var(--accent-2)}

/* platform cards */
.pcard{background:var(--surface);border:1px solid var(--border);border-radius:var(--r);overflow:hidden}
.pcard-h{display:flex;align-items:center;gap:11px;padding:16px 17px;border-bottom:1px solid var(--border)}
.pcard-h .pf{width:28px;height:28px;border-radius:9px;padding:6px}
.pcard-h .p-nm{font-weight:650;font-size:14px}
.pcard-h .p-hd{font-size:11.5px;color:var(--muted)}
.pcard-b{padding:16px 17px;display:flex;flex-direction:column;gap:14px}
.pmini{display:grid;grid-template-columns:1fr 1fr;gap:12px}
.pmini .m-k{font-size:11px;color:var(--muted);text-transform:uppercase;letter-spacing:.04em;font-weight:600}
.pmini .m-v{font-size:19px;font-weight:700;letter-spacing:-.02em;margin-top:2px}
.donut-wrap{display:flex;align-items:center;gap:18px}

/* onboarding */
.ob-plat{display:flex;align-items:center;gap:13px;padding:13px;border:1px solid var(--border);
  border-radius:12px;margin-bottom:11px;background:var(--surface-2);transition:border-color .15s}
.ob-plat.sel{border-color:var(--accent)}
.ob-plat .pf{width:34px;height:34px;border-radius:10px;padding:7px}
.ob-plat .ob-nm{font-weight:650;font-size:14px}
.ob-plat .ob-in{flex:1}
.ob-plat input{width:100%;padding:8px 11px;background:var(--bg);border:1px solid var(--border);
  border-radius:8px;color:var(--ink);font-size:13px;margin-top:5px}
.ob-plat input:focus{border-color:var(--accent);outline:none}
.chk{width:22px;height:22px;border-radius:7px;border:2px solid var(--border-2);flex:none;display:grid;place-items:center}
.ob-plat.sel .chk{background:var(--accent);border-color:var(--accent)}
.chk svg{width:13px;height:13px;color:#fff;opacity:0}
.ob-plat.sel .chk svg{opacity:1}

.toast{position:fixed;bottom:24px;left:50%;transform:translateX(-50%) translateY(20px);
  background:var(--elev);border:1px solid var(--border-2);border-radius:11px;padding:12px 18px;
  box-shadow:var(--shadow);font-size:13px;font-weight:550;z-index:100;opacity:0;
  transition:opacity .25s,transform .25s;display:flex;align-items:center;gap:9px}
.toast.on{opacity:1;transform:translateX(-50%) translateY(0)}
.toast svg{width:17px;height:17px;color:var(--good)}

@media(max-width:820px){
  #app.on{grid-template-columns:1fr}
  .rail{display:none}
  .span2{grid-column:auto}
}
</style>
</head>
<body>


<!-- ===================== AUTH ===================== -->
<div id="auth">
  <canvas id="pulseCanvas"></canvas>
  <div class="auth-card">
    <div class="brand">
      <div class="logo">
        <svg viewBox="0 0 24 24" fill="none" stroke="#fff" stroke-width="2.4" stroke-linecap="round" stroke-linejoin="round"><path d="M2 12h4l2.5-7 4 15 3-9 2 3h4.5"/></svg>
      </div>
      <div><b>PulseBoard</b><span>Live social analytics</span></div>
    </div>
    <div id="authForms"></div>
  </div>
</div>

<!-- ===================== APP ===================== -->
<div id="app">
  <aside class="rail">
    <div class="rail-top">
      <div class="brand">
        <div class="logo"><svg viewBox="0 0 24 24" fill="none" stroke="#fff" stroke-width="2.4" stroke-linecap="round" stroke-linejoin="round"><path d="M2 12h4l2.5-7 4 15 3-9 2 3h4.5"/></svg></div>
        <div><b>PulseBoard</b><span>Live analytics</span></div>
      </div>
    </div>
    <nav class="nav" id="nav">

/* ---------- number / date fmt ---------- */
function fmt(n){n=Math.round(n);
  if(Math.abs(n)>=1e6)return (n/1e6).toFixed(n%1e6===0?0:1).replace(/\.0$/,'')+'M';
  if(Math.abs(n)>=1e3)return (n/1e3).toFixed(Math.abs(n)>=1e4?0:1).replace(/\.0$/,'')+'K';
  return n.toLocaleString('en-US');}

/* ---------- seeded RNG (mulberry32) ---------- */
function seedFrom(str){let h=1779033703^str.length;for(let i=0;i<str.length;i++){h=Math.imul(h^str.charCodeAt(i),3432918353);h=h<<13|h>>>19;}return h>>>0;}

/* =========================================================================

let DATA=null, STATE={range:30, scope:'all', playing:true};

function buildData(email, accounts){
  const master=seedFrom(email||'guest');
  const days=90, today=new Date(); today.setHours(0,0,0,0);
  const plats={};
  for(const k of accounts){
    const p=PLATS[k], r=rng(master^seedFrom(k));
    const growthRate=0.0016+r()*0.0042;          // daily follower growth
    let followers=p.base.followers*(0.85+r()*0.4);
    const startFollowers=followers/Math.pow(1+growthRate,days);
    followers=startFollowers;
    const series=[];
    for(let i=days-1;i>=0;i--){
      const date=new Date(today); date.setDate(date.getDate()-i);
      const dow=date.getDay();
      const weekend=(dow===0||dow===6)?1.12:1;
      const wobble=1+(r()-0.5)*0.18;
      const spike=r()>0.94?1.6+r():1;             // occasional viral day
      followers*=1+growthRate*(0.6+r()*0.9);
      const reach=followers*p.base.reachMul*weekend*wobble*spike;
      const views=followers*p.base.viewMul*weekend*wobble*spike;
      const er=p.base.er*(0.82+r()*0.42);
      const eng=reach*er/100;
      series.push({date, followers:Math.round(followers), reach:Math.round(reach),
        views:Math.round(views), eng:Math.round(eng), er});
    }
    // audience
    const ageShape=k==='tiktok'?[0.14,0.40,0.27,0.11,0.05,0.03]:k==='instagram'?[0.06,0.33,0.34,0.16,0.07,0.04]:[0.02,0.16,0.30,0.26,0.16,0.10];
    const gF=k==='instagram'?0.58:k==='tiktok'?0.54:0.47;
    const heat=[]; for(let d=0;d<7;d++){const row=[];for(let h=0;h<24;h++){
      let v=Math.exp(-Math.pow(h-19,2)/26)+0.5*Math.exp(-Math.pow(h-12,2)/16)+0.15;
      if(d===0||d===6)v*=1.15; v*=0.7+r()*0.6; row.push(v);}heat.push(row);}
    const countries=CTRIES.map(c=>({name:c[0],flag:c[1],v:r()})).sort((a,b)=>b.v-a.v).slice(0,6);
    const cs=countries.reduce((s,c)=>s+c.v,0); countries.forEach(c=>c.share=c.v/cs);
    plats[k]={meta:p, series,
      ages:['13-17','18-24','25-34','35-44','45-54','55+'].map((a,i)=>({a,v:ageShape[i]})),
      genderF:gF, countries, heat,
      devices:k==='facebook'?{Mobile:.78,Desktop:.19,Tablet:.03}:{Mobile:.94,Desktop:.04,Tablet:.02}};
  }
  // content
  const content=[];
  for(const k of accounts){
    const p=PLATS[k], r=rng(master^seedFrom(k+'c')), pool=TITLES[k];
    const n=8;
    for(let i=0;i<n;i++){
      const date=new Date(today); date.setDate(date.getDate()-Math.floor(r()*88));
      const base=plats[k].series[plats[k].series.length-1].reach;
      const viral=r()>0.8?2.2+r()*3:0.5+r()*1.1;
      const views=Math.round(base*viral*(k==='tiktok'?1.7:1));
      const er=p.base.er*(0.5+r()*1.6);
      const eng=Math.round(views*er/100);
      const shares=Math.round(eng*(0.05+r()*0.12));
      const saves=Math.round(eng*(0.08+r()*0.18));
      const comments=Math.round(eng*(0.04+r()*0.09));
      const watch=k==='facebook'?0:Math.round((6+r()*38));
      const ret=Math.round(28+r()*55);
      content.push({plat:k,title:pool[i%pool.length],date,views,er,eng,shares,saves,comments,watch,ret,
        type:k==='facebook'?'Post':(r()>0.4?'Reel':'Video')});
    }
  }
  content.sort((a,b)=>b.views-a.views);
  DATA={plats, content, accounts, generatedFor:email};
}

/* ---------- aggregation helpers ---------- */
function activeKeys(){return STATE.scope==='all'?DATA.accounts:[STATE.scope];}
function sliceSeries(k){const s=DATA.plats[k].series;return s.slice(s.length-STATE.range);}
// aggregate a metric across active platforms into [{date,v}]
function aggSeries(metric){
  const keys=activeKeys(), len=STATE.range, out=[];
  for(let i=0;i<len;i++){let v=0,date=null;
    for(const k of keys){const s=sliceSeries(k)[i]; v+=s[metric]; date=s.date;}
    out.push({date,v});}
  return out;
}
function totalNow(metric){return activeKeys().reduce((s,k)=>s+sliceSeries(k).at(-1)[metric],0);}
function periodSum(metric){return activeKeys().reduce((s,k)=>s+sliceSeries(k).reduce((a,d)=>a+d[metric],0),0);}
// delta: compare last half vs prior half of range (for flow metrics) — returns %
function deltaFlow(metric){
  const keys=activeKeys(),len=STATE.range,h=Math.floor(len/2);let cur=0,prev=0;
  for(const k of keys){const s=sliceSeries(k);
    for(let i=len-h;i<len;i++)cur+=s[i][metric];
    for(let i=len-2*h;i<len-h;i++)prev+=s[i][metric];}
  return prev?((cur-prev)/prev*100):0;
}
function deltaStock(metric){ // followers: now vs range-start
  const keys=activeKeys();let now=0,then=0;
  for(const k of keys){const s=sliceSeries(k);now+=s.at(-1)[metric];then+=s[0][metric];}
  return then?((now-then)/then*100):0;
}
function avgER(){const keys=activeKeys();let er=0,w=0;
  for(const k of keys){const s=sliceSeries(k);const reach=s.reduce((a,d)=>a+d.reach,0);
    const eng=s.reduce((a,d)=>a+d.eng,0);er+=eng;w+=reach;}
  return w?er/w*100:0;
}

const hash=(s)=>{let h=0;for(let i=0;i<s.length;i++){h=(h*31+s.charCodeAt(i))>>>0;}return h.toString(36);};

function renderAuth(mode){ // 'login' | 'signup'
  const f=$('#authForms');

  }else{

      <h1>Welcome back</h1>

      <div class="field"><label>Email</label><input id="a_email" type="email" placeholder="you@studio.com" autocomplete="email"></div>

    $('#a_go').onclick=doLogin; $('#a_switch').onclick=()=>renderAuth('signup');

}
function doSignup(){
  const name=$('#a_name').value.trim(),email=$('#a_email').value.trim().toLowerCase(),pass=$('#a_pass').value;
  const err=$('#a_err');
  if(!name){err.textContent='Please enter your name.';return;}
  if(!/^[^@\s]+@[^@\s]+\.[^@\s]+$/.test(email)){err.textContent='Enter a valid email address.';return;}
  if(pass.length<6){err.textContent='Password must be at least 6 characters.';return;}
  const users=getUsers();
  if(users[email]){err.textContent='That email is already registered. Sign in instead.';return;}
  users[email]={name,pass:hash(pass),accounts:null,created:Date.now()};
  setUsers(users);
  startOnboarding({email,name});
}
function doLogin(){
  const email=$('#a_email').value.trim().toLowerCase(),pass=$('#a_pass').value,err=$('#a_err');
  const users=getUsers(),u=users[email];
  if(!u||u.pass!==hash(pass)){err.textContent='Wrong email or password.';return;}
  if(!u.accounts){startOnboarding({email,name:u.name});return;}
  setSession({email});
  launchApp(email,u.name,u.accounts);
}

// Multi-series line/area chart with crosshair tooltip.
// series: [{key,label,color,values:[{date,v}]}]
function lineChart(mount,series,opts={}){
  const wrap=H('<div class="chart-wrap"></div>');
  const svg=document.createElementNS('http://www.w3.org/2000/svg','svg');
  const tip=H('<div class="tip"></div>');
  wrap.appendChild(svg);wrap.appendChild(tip);mount.appendChild(wrap);
  const H_=opts.height||230;

  function draw(){
    const W=wrap.clientWidth||600;
    const padL=46,padR=14,padT=12,padB=26;
    svg.setAttribute('viewBox',`0 0 ${W} ${H_}`);svg.setAttribute('height',H_);
    const vis=series.filter(s=>!state.hidden.has(s.key));
    const n=series[0].values.length;
    let max=0;for(const s of vis)for(const p of s.values)max=Math.max(max,p.v);
    max=max||1;const yMax=max*1.12;
    const X=i=>padL+(W-padL-padR)*(n<2?0.5:i/(n-1));
    const Y=v=>padT+(H_-padT-padB)*(1-v/yMax);
    let g='';
    // grid + y labels
    const ticks=4;
    for(let t=0;t<=ticks;t++){const val=yMax*t/ticks,y=Y(val);
      g+=`<line x1="${padL}" x2="${W-padR}" y1="${y}" y2="${y}" stroke="${resolveColor('var(--grid)')}" stroke-width="1"/>`;
      g+=`<text x="${padL-8}" y="${y+3.5}" text-anchor="end" font-size="10" fill="${resolveColor('var(--muted)')}">${fmt(val)}</text>`;}
    // x labels (~5)
    const step=Math.max(1,Math.round(n/5));
    for(let i=0;i<n;i+=step){const d=series[0].values[i].date;
      g+=`<text x="${X(i)}" y="${H_-8}" text-anchor="middle" font-size="10" fill="${resolveColor('var(--muted)')}">${dLabel(d)}</text>`;}
    // areas + lines
    for(const s of vis){const col=resolveColor(s.color);
      let dLine='',dArea='';
      s.values.forEach((p,i)=>{const x=X(i),y=Y(p.v);dLine+=(i?'L':'M')+x.toFixed(1)+' '+y.toFixed(1)+' ';});
      dArea=dLine+`L${X(n-1)} ${Y(0)} L${X(0)} ${Y(0)} Z`;
      const gid='ga_'+s.key+'_'+Math.round(W);
      g+=`<defs><linearGradient id="${gid}" x1="0" x2="0" y1="0" y2="1">
        <stop offset="0" stop-color="${col}" stop-opacity="${vis.length>1?.16:.28}"/>
        <stop offset="1" stop-color="${col}" stop-opacity="0"/></linearGradient></defs>`;
      g+=`<path d="${dArea}" fill="url(#${gid})"/>`;
      g+=`<path d="${dLine}" fill="none" stroke="${col}" stroke-width="2.4" stroke-linejoin="round" stroke-linecap="round"/>`;
      // endpoint
      const lx=X(n-1),ly=Y(s.values.at(-1).v);
      g+=`<circle cx="${lx}" cy="${ly}" r="3.4" fill="${col}" stroke="${resolveColor('var(--surface)')}" stroke-width="2"/>`;
    }
    g+=`<line id="cross" x1="0" x2="0" y1="${padT}" y2="${H_-padB}" stroke="${resolveColor('var(--border-2)')}" stroke-width="1" style="opacity:0"/>`;
    svg.innerHTML=g;
    // interaction overlay
    svg.onmousemove=(e)=>{
      const r=svg.getBoundingClientRect();const mx=(e.clientX-r.left)/r.width*W;
      let i=Math.round((mx-padL)/((W-padL-padR)/(n-1)));i=clamp(i,0,n-1);
      const cross=svg.querySelector('#cross');cross.setAttribute('x1',X(i));cross.setAttribute('x2',X(i));cross.style.opacity=1;
      const d=series[0].values[i].date;
      let rows='';for(const s of vis){rows+=`<div class="tt-r"><i style="background:${resolveColor(s.color)}"></i>${s.label}<b>${fmtFull(s.values[i].v)}</b></div>`;}
      tip.innerHTML=`<div class="tt-d">${DOW[d.getDay()]}, ${dLabel(d)}</div>${rows}`;
      tip.style.left=(X(i)/W*100)+'%';tip.style.top=(Y(Math.max(...vis.map(s=>s.values[i].v)))/H_*100)+'%';
      tip.style.opacity=1;
    };
    svg.onmouseleave=()=>{tip.style.opacity=0;const c=svg.querySelector('#cross');if(c)c.style.opacity=0;};
  }
  draw();
  if(opts.legendMount&&series.length>1){
    const lg=H('<div class="legend"></div>');
    series.forEach(s=>{const el=H(`<span><i style="background:${resolveColor(s.color)}"></i>${s.label}</span>`);
      el.onclick=()=>{if(state.hidden.has(s.key))state.hidden.delete(s.key);else if(state.hidden.size<series.length-1)state.hidden.add(s.key);
        el.classList.toggle('off',state.hidden.has(s.key));draw();};
      lg.appendChild(el);});
    opts.legendMount.appendChild(lg);
  }
  const ro=new ResizeObserver(()=>draw());ro.observe(wrap);
  return {redraw:draw};
}

// sparkline (mini area)
function sparkSVG(vals,color){
  const W=74,Hh=30,pad=2,n=vals.length,min=Math.min(...vals),max=Math.max(...vals),rng=(max-min)||1;
  const X=i=>pad+(W-2*pad)*i/(n-1),Y=v=>pad+(Hh-2*pad)*(1-(v-min)/rng);
  let l='';vals.forEach((v,i)=>l+=(i?'L':'M')+X(i).toFixed(1)+' '+Y(v).toFixed(1)+' ');
  const a=l+`L${X(n-1)} ${Hh} L${X(0)} ${Hh} Z`;const c=resolveColor(color);
  return `<svg class="spark" viewBox="0 0 ${W} ${Hh}">
    <defs><linearGradient id="sp${Math.round(Math.random()*1e6)}" x1="0" x2="0" y1="0" y2="1"><stop offset="0" stop-color="${c}" stop-opacity=".3"/><stop offset="1" stop-color="${c}" stop-opacity="0"/></linearGradient></defs>
    <path d="${a}" fill="${c}" opacity=".14"/><path d="${l}" fill="none" stroke="${c}" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
    <circle cx="${X(n-1)}" cy="${Y(vals.at(-1))}" r="2.4" fill="${c}"/></svg>`;
}
function donutSVG(segsPct,colors,size=120){ // segsPct sums ~1
  const r=size/2-9,cx=size/2,cy=size/2,C=2*Math.PI*r;let off=0,g='';
  segsPct.forEach((p,i)=>{const len=p*C;
    g+=`<circle cx="${cx}" cy="${cy}" r="${r}" fill="none" stroke="${resolveColor(colors[i])}" stroke-width="14"
      stroke-dasharray="${len} ${C-len}" stroke-dashoffset="${-off}" transform="rotate(-90 ${cx} ${cy})" stroke-linecap="butt"/>`;
    off+=len;});
  return `<svg width="${size}" height="${size}" viewBox="0 0 ${size} ${size}">${g}</svg>`;
}

function deltaPill(v){const up=v>=0;
  return `<span class="delta ${up?'up':'down'}"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="3" stroke-linecap="round" stroke-linejoin="round">${up?'<path d="M6 15l6-6 6 6"/>':'<path d="M6 9l6 6 6-6"/>'}</svg>${pct(Math.abs(v))}</span>`;}

function tile(lbl,val,delta,sparkVals,color){
  return `<div class="tile"><div class="t-lbl">${lbl}</div>
    <div class="t-val tnum">${val}</div>
    <div class="t-row">${deltaPill(delta)}${sparkSVG(sparkVals,color)}</div></div>`;
}

function genInsights(){
  const out=[], keys=activeKeys();
  // best platform by ER
  const erByK=keys.map(k=>{const s=sliceSeries(k);return{k,er:s.reduce((a,d)=>a+d.eng,0)/s.reduce((a,d)=>a+d.reach,0)*100};}).sort((a,b)=>b.er-a.er);
  const best=erByK[0];
  out.push({h:`${PLATS[best.k].name} is your engagement leader`,
    p:`It’s converting reach at ${best.er.toFixed(1)}% — above your other channels. Double down on the formats working here.`,
    tag:'Opportunity',col:PLATS[best.k].color,soft:PLATS[best.k].soft,
    icon:'<path d="M13 2L3 14h7l-1 8 10-12h-7z"/>'});
  // best time
  const heat=DATA.plats[keys[0]].heat;let bd=0,bh=0,bv=0;
  heat.forEach((row,d)=>row.forEach((v,h)=>{if(v>bv){bv=v;bd=d;bh=h;}}));
  out.push({h:'Post around your peak window',
    p:`Your audience is most active <b>${DOW[bd]} ${((bh%12)||12)}${bh<12?'am':'pm'}</b>. Scheduling drops here can lift first-hour reach noticeably.`,
    tag:'Timing',col:'var(--fb)',soft:'var(--fb-soft)',
    icon:'<circle cx="12" cy="12" r="9"/><path d="M12 7v5l3 2"/>'});
  // top content driver
  const top=DATA.content.filter(x=>keys.includes(x.plat))[0];
  if(top)out.push({h:'Short video is carrying reach',
    p:`“${top.title}” on ${PLATS[top.plat].name} pulled ${fmt(top.views)} views at ${top.er.toFixed(1)}% engagement. Cut more in this style.`,
    tag:'Content',col:'var(--tt)',soft:'var(--tt-soft)',
    icon:'<polygon points="5 3 19 12 5 21 5 3"/>'});
  // momentum warning/positive
  const rd=deltaFlow('reach');
  if(rd<0)out.push({h:'Reach cooled this period',
    p:`Reach is ${pct(rd)} vs the prior window. Try 2–3 native videos and reply to comments within the first hour to recover the algorithm signal.`,
    tag:'Watch',col:'var(--warn)',soft:'color-mix(in srgb,var(--warn) 14%,transparent)',
    icon:'<path d="M12 9v4M12 17h.01M10.3 3.9 1.8 18a2 2 0 0 0 1.7 3h17a2 2 0 0 0 1.7-3L13.7 3.9a2 2 0 0 0-3.4 0z"/>'});
  else out.push({h:'Momentum is building',
    p:`Reach is up ${pct(rd)} period over period. Keep your posting cadence steady — consistency is compounding for you right now.`,
    tag:'Trending',col:'var(--good)',soft:'color-mix(in srgb,var(--good) 14%,transparent)',
    icon:'<path d="M3 17l6-6 4 4 8-8M21 7h-6M21 7v6"/>'});
  return out;
}

  // countries
  const cCard=H(`<div class="card"><div class="card-h"><h3>Top locations</h3></div><div class="barlist"></div></div>`);
  cCard.querySelector('.barlist').innerHTML=countries.map(ct=>`
    <div class="bl-row" style="grid-template-columns:130px 1fr 42px"><span class="bl-k">${ct.flag} ${ct.name}</span>
    <div class="bl-track"><div class="bl-fill" style="width:${(ct.v/countries[0].v*100).toFixed(1)}%;background:var(--accent)"></div></div>
    <span class="bl-v">${(ct.v/cs*100).toFixed(0)}%</span></div>`).join('');
  g2.appendChild(cCard);
  // heatmap span2
  const hCard=H(`<div class="card span2"><div class="card-h"><h3>Best time to post</h3><span class="grow"></span><span class="hint">follower activity by hour · local time</span></div><div id="heat"></div>
    <div class="heat-legend">Less<span class="sc" style="opacity:.18"></span><span class="sc" style="opacity:.4"></span><span class="sc" style="opacity:.65"></span><span class="sc" style="opacity:1"></span>More</div></div>`);
  g2.appendChild(hCard);
  c.appendChild(g2);
  // build heatmap (avg heat across active plats)
  const heat=[];for(let d=0;d<7;d++){const row=[];for(let h=0;h<24;h++){row.push(keys.reduce((s,k)=>s+DATA.plats[k].heat[d][h],0)/keys.length);}heat.push(row);}
  let hmax=0;heat.forEach(r=>r.forEach(v=>hmax=Math.max(hmax,v)));
  const hm=hCard.querySelector('#heat');
  let html='<div class="hh"></div>';
  for(let h=0;h<24;h+=1)html+=`<div class="hh">${h%3===0?(h%12||12):''}</div>`;
  for(let d=0;d<7;d++){html+=`<div class="hd">${DOW[d]}</div>`;
    for(let h=0;h<24;h++){const v=heat[d][h]/hmax;const o=(0.12+v*0.88).toFixed(2);
      const t=`${DOW[d]} ${((h%12)||12)}${h<12?'am':'pm'} · ${(v*100).toFixed(0)}% of peak`;
      html+=`<div class="cell" style="opacity:${o}" title="${t}"></div>`;}}
  hm.innerHTML=html;
}

/* ---------- PLATFORMS ---------- */
function renderPlatforms(c){
  const users=getUsers(),handles=(users[DATA.generatedFor]||{}).handles||{};
  const grid=H(`<div class="grid k3"></div>`);
  DATA.accounts.forEach(k=>{
    const p=PLATS[k],s=sliceSeries(k);
    const foll=s.at(-1).followers, reach=s.reduce((a,d)=>a+d.reach,0),
          views=s.reduce((a,d)=>a+d.views,0), er=s.reduce((a,d)=>a+d.eng,0)/reach*100;
    const dF=((s.at(-1).followers-s[0].followers)/s[0].followers*100);
    const card=H(`<div class="pcard">
      <div class="pcard-h"><span class="pf" style="background:${p.color};display:grid;place-items:center">${p.icon}</span>
        <div><div class="p-nm">${p.name}</div><div class="p-hd">${handles[k]||'@'+p.name.toLowerCase()}</div></div></div>
      <div class="pcard-b">
        <div class="pmini">
          <div><div class="m-k">Followers</div><div class="m-v tnum">${fmt(foll)} ${deltaPill(dF)}</div></div>
          <div><div class="m-k">Eng. rate</div><div class="m-v tnum">${er.toFixed(1)}%</div></div>
          <div><div class="m-k">Reach (${STATE.range}d)</div><div class="m-v tnum">${fmt(reach)}</div></div>
          <div><div class="m-k">Views (${STATE.range}d)</div><div class="m-v tnum">${fmt(views)}</div></div>
        </div>
        <div class="chart-mini"></div>
      </div></div>`);
    grid.appendChild(card);
    lineChart(card.querySelector('.chart-mini'),[{key:k,label:p.name,color:p.color,values:s.map(d=>({date:d.date,v:d.followers}))}],{height:120});
  });
  c.appendChild(grid);

  // comparison chart: reach over time all platforms
  const cmp=H(`<div class="card span2" style="margin-top:16px"><div class="card-h"><h3>Reach comparison</h3><div class="grow"></div><div id="cmpLeg"></div></div><div id="cmpChart"></div></div>`);
  const wrap=H(`<div class="grid k1"></div>`);wrap.appendChild(cmp);c.appendChild(cmp);
  const series=DATA.accounts.map(k=>({key:k,label:PLATS[k].name,color:PLATS[k].color,values:sliceSeries(k).map(d=>({date:d.date,v:d.reach}))}));
  lineChart($('#cmpChart',cmp),series,{height:240,legendMount:$('#cmpLeg',cmp)});
}

/* ---------- LIVE ---------- */
let liveTimers=[];
function clearLive(){liveTimers.forEach(t=>clearInterval(t));liveTimers=[];}
function renderLive(c){
  clearLive();
  const keys=activeKeys();
  // live counters
  const tiles=H(`<div class="grid k4"></div>`);
  const base={online:Math.round(totalNow('followers')*0.014),likes:0,comments:0,shares:0};
  tiles.innerHTML=
     `<div class="tile"><div class="t-lbl">Active now</div><div class="t-val tnum" id="lvOnline">${fmt(base.online)}</div><div class="t-row"><span class="delta up"><span class="live-dot" style="background:var(--good)"></span>live</span></div></div>`
    +`<div class="tile"><div class="t-lbl">Likes / min</div><div class="t-val tnum" id="lvLikes">0</div></div>`
    +`<div class="tile"><div class="t-lbl">Comments / min</div><div class="t-val tnum" id="lvComments">0</div></div>`
    +`<div class="tile"><div class="t-lbl">Shares / min</div><div class="t-val tnum" id="lvShares">0</div></div>`;
  c.appendChild(tiles);

  const g=H(`<div class="grid k3" style="margin-top:16px"></div>`);
  const feedCard=H(`<div class="card span2"><div class="card-h"><h3>Live activity</h3><span class="grow"></span><span class="live-badge"><span class="live-dot"></span>streaming</span></div><div class="feed" id="feed"></div></div>`);
  g.appendChild(feedCard);
  // pulse now: interactions last 60 min mini
  const pulseCard=H(`<div class="card"><div class="card-h"><h3>Interactions · last hour</h3></div><div id="pulseChart"></div></div>`);
  g.appendChild(pulseCard);
  c.appendChild(g);

  // pulse chart data (60 points), will nudge live
  const pulse=[];for(let i=0;i<60;i++)pulse.push({date:new Date(Date.now()-(59-i)*60000),v:Math.round(base.online*(0.3+Math.random()*0.5))});
  const pc=lineChart($('#pulseChart',pulseCard),[{key:'p',label:'Interactions',color:'var(--accent)',values:pulse}],{height:150});

  const feed=$('#feed',feedCard);
  const ACTS=[
    {t:'liked',icon:'<path d="M20.8 4.6a5.5 5.5 0 0 0-7.8 0L12 5.6l-1-1a5.5 5.5 0 0 0-7.8 7.8l1 1L12 21l7.8-7.6 1-1a5.5 5.5 0 0 0 0-7.8z"/>',col:'var(--ig)'},
    {t:'started following you',icon:'<path d="M16 21v-2a4 4 0 0 0-4-4H6a4 4 0 0 0-4 4v2M9 11a4 4 0 1 0 0-8 4 4 0 0 0 0 8M19 8v6M22 11h-6"/>',col:'var(--good)'},
    {t:'commented',icon:'<path d="M21 11.5a8.4 8.4 0 0 1-11.9 7.6L3 21l1.9-6.1A8.4 8.4 0 1 1 21 11.5z"/>',col:'var(--fb)'},
    {t:'shared your post',icon:'<circle cx="18" cy="5" r="3"/><circle cx="6" cy="12" r="3"/><circle cx="18" cy="19" r="3"/><path d="M8.6 13.5l6.8 4M15.4 6.5l-6.8 4"/>',col:'var(--tt)'},
    {t:'saved your video',icon:'<path d="M19 21l-7-5-7 5V5a2 2 0 0 1 2-2h10a2 2 0 0 1 2 2z"/>',col:'var(--accent)'}
  ];
  function addEvent(initial){
    const a=ACTS[Math.floor(Math.random()*ACTS.length)];
    const nm=NAMES[Math.floor(Math.random()*NAMES.length)]+' '+String.fromCharCode(65+Math.floor(Math.random()*26))+'.';
    const k=keys[Math.floor(Math.random()*keys.length)];
    const row=H(`<div class="feed-i ${initial?'':'new'}">
      <span class="fi-ic" style="background:${a.t.includes('follow')?'color-mix(in srgb,var(--good) 14%,transparent)':PLATS[k].soft}">
        <svg viewBox="0 0 24 24" fill="none" stroke="${a.col}" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">${a.icon}</svg></span>
      <div class="fi-tx"><b>${nm}</b> <span class="fi-s">${a.t} on ${PLATS[k].name}</span></div>
      <span class="fi-t">now</span></div>`);
    feed.prepend(row);
    // age existing timestamps
    $$('.feed-i',feed).forEach((r,i)=>{if(i>0){const t=r.querySelector('.fi-t');const s=(parseInt(t.dataset.s||'0'))+1;t.dataset.s=s;t.textContent=s<60?s+'s':Math.floor(s/60)+'m';}});
    row.querySelector('.fi-t').dataset.s='0';
    while(feed.children.length>40)feed.lastElementChild.remove();
  }
  for(let i=0;i<12;i++){addEvent(true);}
  $$('.feed-i',feed).forEach((r,i)=>{const t=r.querySelector('.fi-t');t.dataset.s=i*7;t.textContent=(i*7)+'s';});

  // live tick
  let lk=0,cm=0,sh=0;
  const tick=()=>{
    if(!STATE.playing)return;
    const on=base.online+Math.round((Math.random()-0.5)*base.online*0.08);
    $('#lvOnline')&&($('#lvOnline').textContent=fmt(on));
    lk=Math.max(0,lk+Math.round((Math.random()-0.42)*40)+18);
    cm=Math.max(0,cm+Math.round((Math.random()-0.45)*8)+3);
    sh=Math.max(0,sh+Math.round((Math.random()-0.45)*5)+1);
    $('#lvLikes')&&($('#lvLikes').textContent=fmt(lk));
    $('#lvComments')&&($('#lvComments').textContent=fmt(cm));
    $('#lvShares')&&($('#lvShares').textContent=fmt(sh));
    pulse.push({date:new Date(),v:on});pulse.shift();pc.redraw();
  };
  liveTimers.push(setInterval(tick,1500));
  const reduce=matchMedia('(prefers-reduced-motion:reduce)').matches;
  liveTimers.push(setInterval(()=>{if(STATE.playing)addEvent(false);},reduce?4000:1900));
}

/* =========================================================================
   TOPBAR WIRING
   ========================================================================= */
function buildScopeMenu(){
  const m=$('#scopeMenu');
  m.innerHTML=`<button data-s="all"><span class="dot" style="background:linear-gradient(90deg,var(--fb),var(--ig),var(--tt))"></span>All platforms</button><hr>`
    +DATA.accounts.map(k=>`<button data-s="${k}"><span class="dot" style="background:${PLATS[k].color}"></span>${PLATS[k].name}</button>`).join('');
  m.querySelectorAll('button').forEach(b=>b.onclick=()=>{
    STATE.scope=b.dataset.s;
    $('#scopeLbl').textContent=b.dataset.s==='all'?'All platforms':PLATS[b.dataset.s].name;
    const d=$('#scopeBtn .dot');d.style.background=b.dataset.s==='all'?'linear-gradient(90deg,var(--fb),var(--ig),var(--tt))':PLATS[b.dataset.s].color;
    m.classList.remove('open');clearLive();render();
  });
}
function wireTopbar(){
  $('#rangeSeg').querySelectorAll('button').forEach(b=>b.onclick=()=>{
    STATE.range=+b.dataset.r;$('#rangeSeg button').forEach?0:0;
    $$('#rangeSeg button').forEach(x=>x.classList.toggle('on',x===b));clearLive();render();});
  $('#scopeBtn').onclick=(e)=>{e.stopPropagation();$('#scopeMenu').classList.toggle('open');};
  document.addEventListener('click',()=>$('#scopeMenu').classList.remove('open'));
  $('#themeBtn').onclick=toggleTheme;
  $('#exportBtn').onclick=exportReport;
  $('#userChip').onclick=logout;
}
function toggleTheme(){
  const cur=document.documentElement.getAttribute('data-theme')
    ||(matchMedia('(prefers-color-scheme:dark)').matches?'dark':'light');
  const next=cur==='dark'?'light':'dark';
  document.documentElement.setAttribute('data-theme',next);
  lsSet('pulseboard.theme',next);
  clearLive();render();
}
function applyStoredTheme(){const t=localStorage.getItem('pulseboard.theme');if(t)document.documentElement.setAttribute('data-theme',t);}

function exportReport(){
  const keys=activeKeys();
  let csv='PulseBoard report\nGenerated for,'+DATA.generatedFor+'\nWindow,'+STATE.range+' days\nScope,'+(STATE.scope==='all'?'All platforms':PLATS[STATE.scope].name)+'\n\n';
  csv+='Platform,Followers,Reach ('+STATE.range+'d),Views ('+STATE.range+'d),Engagement rate\n';
  keys.forEach(k=>{const s=sliceSeries(k);const reach=s.reduce((a,d)=>a+d.reach,0);
    csv+=`${PLATS[k].name},${s.at(-1).followers},${reach},${s.reduce((a,d)=>a+d.views,0)},${(s.reduce((a,d)=>a+d.eng,0)/reach*100).toFixed(2)}%\n`;});
  csv+='\nTop content,Platform,Views,Engagement rate,Shares,Saves\n';
  DATA.content.filter(x=>keys.includes(x.plat)).slice(0,15).forEach(x=>{
    csv+=`"${x.title}",${PLATS[x.plat].name},${x.views},${x.er.toFixed(1)}%,${x.shares},${x.saves}\n`;});
  const blob=new Blob([csv],{type:'text/csv'});const url=URL.createObjectURL(blob);
  const a=document.createElement('a');a.href=url;a.download='pulseboard-report.csv';a.click();URL.revokeObjectURL(url);
  toast('Report exported to CSV');
}
function toast(msg){const t=$('#toast');
  t.innerHTML=`<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.6" stroke-linecap="round" stroke-linejoin="round"><path d="M20 6L9 17l-5-5"/></svg>${msg}`;
  t.classList.add('on');setTimeout(()=>t.classList.remove('on'),2400);}

/* =========================================================================
   APP LIFECYCLE
   ========================================================================= */
function launchApp(email,name,accounts){
  buildData(email,accounts);
  STATE.range=30;STATE.scope='all';STATE.playing=true;
  $('#auth').style.display='none';
  $('#app').classList.add('on');
  $('#uName').textContent=name;
  $('#uEmail').textContent=email;
  $('#avatar').textContent=(name||'U').trim()[0].toUpperCase();
  $('#scopeLbl').textContent='All platforms';
  buildNav();buildScopeMenu();
  CUR='overview';$$('#nav a').forEach(a=>a.classList.toggle('active',a.dataset.view==='overview'));
  $('#viewTitle').textContent='Overview';
  render();
}
function logout(){
  if(!confirm('Sign out of PulseBoard?'))return;
  clearLive();setSession(null);
  $('#app').classList.remove('on');
  $('#auth').style.display='grid';
  renderAuth('login');
}

/* ---------- auth pulse background canvas ---------- */
function initPulseBg(){
  const cv=$('#pulseCanvas');if(!cv)return;const ctx=cv.getContext('2d');let raf,t=0;
  const reduce=matchMedia('(prefers-reduced-motion:reduce)').matches;
  function resize(){cv.width=cv.clientWidth*devicePixelRatio;cv.height=cv.clientHeight*devicePixelRatio;}
  resize();addEventListener('resize',resize);
  const cols=[cssVar('--fb'),cssVar('--ig'),cssVar('--tt')];
  function frame(){
    const w=cv.width,h=cv.height;ctx.clearRect(0,0,w,h);
    for(let s=0;s<3;s++){ctx.beginPath();
      for(let x=0;x<=w;x+=6){const y=h*(0.35+s*0.18)
        +Math.sin(x*0.006+t*0.02+s*2)*h*0.05
        +Math.sin(x*0.013+t*0.03+s)*h*0.03;
        x===0?ctx.moveTo(x,y):ctx.lineTo(x,y);}
      ctx.strokeStyle=cols[s];ctx.globalAlpha=0.5;ctx.lineWidth=2*devicePixelRatio;ctx.stroke();}
    ctx.globalAlpha=1;t++;
    if(!reduce)raf=requestAnimationFrame(frame);
  }
  frame();
}

/* ---------- boot ---------- */
applyStoredTheme();
wireTopbar();
initPulseBg();
(function boot(){
  const s=getSession();
  if(s){const u=getUsers()[s.email];if(u&&u.accounts){launchApp(s.email,u.name,u.accounts);return;}}
  renderAuth('login');
})();
</script>
